<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroupForge • Hindsight AI Project Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-dark { background: rgba(0,0,0,0.3); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        
        .chat-bubble-user { background: linear-gradient(135deg, #0ea5e9, #06b6d4); }
        .chat-bubble-ai { background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(168,85,247,0.2)); }
        .memory-card:hover { transform: scale(1.02); transition: transform 0.2s ease; }
        
        .member-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .member-card:hover { background: rgba(14,165,233,0.1); }
        .member-card.selected { background: rgba(14,165,233,0.2); border-color: #0ea5e9; }
        
        .tab-active { border-bottom: 3px solid #0ea5e9; color: white; }
        
        .gradient-text { background: linear-gradient(135deg, #0ea5e9, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(14,165,233,0.3); border-radius: 3px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 overflow-hidden">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-72 bg-zinc-900 border-r border-zinc-800 p-6 flex flex-col overflow-y-auto">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-11 h-11 bg-gradient-to-br from-cyan-500 to-sky-400 rounded-2xl flex items-center justify-center shadow-lg shadow-cyan-500/30">
                    <i class="fa-solid fa-cube text-xl text-white"></i>
                </div>
                <div>
                    <h1 class="logo-font text-2xl font-bold tracking-tight gradient-text">GroupForge</h1>
                    <p class="text-xs text-cyan-400 -mt-0.5">Hindsight Memory v2</p>
                </div>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="text-xs text-zinc-500 uppercase tracking-wider">Project ID</label>
                    <input id="bankId" value="cs101-final-project" class="w-full glass rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-cyan-500 mt-1">
                </div>
                <div>
                    <label class="text-xs text-zinc-500 uppercase tracking-wider">Hindsight Token</label>
                    <input id="hindsightToken" type="password" value="hsk_0cf4a71deac93df3f5043120479254d8" class="w-full glass rounded-xl px-4 py-2.5 text-sm mt-1">
                </div>
            </div>

            <!-- Team Members Section -->
            <div class="mt-8">
                <div class="flex items-center justify-between mb-3">
                    <label class="text-xs text-zinc-500 uppercase tracking-wider">Team Members</label>
                    <button onclick="openAddMemberModal()" class="text-cyan-400 hover:text-cyan-300 text-xs">
                        <i class="fa-solid fa-plus"></i> Add
                    </button>
                </div>
                <div id="membersList" class="space-y-2">
                    <!-- Populated by JS -->
                </div>
            </div>

            <div class="mt-auto space-y-2 pt-6">
                <button onclick="switchTab(0)" class="w-full h-11 glass hover:bg-white/10 rounded-xl flex items-center justify-center gap-3 text-sm font-medium transition-all">
                    <i class="fa-solid fa-comments"></i> Chat
                </button>
                <button onclick="switchTab(1)" class="w-full h-11 glass hover:bg-white/10 rounded-xl flex items-center justify-center gap-3 text-sm font-medium transition-all">
                    <i class="fa-solid fa-table-columns"></i> Kanban
                </button>
                <button onclick="switchTab(2)" class="w-full h-11 glass hover:bg-white/10 rounded-xl flex items-center justify-center gap-3 text-sm font-medium transition-all">
                    <i class="fa-solid fa-chart-pie"></i> Dashboard
                </button>
                <button onclick="switchTab(3)" class="w-full h-11 glass hover:bg-white/10 rounded-xl flex items-center justify-center gap-3 text-sm font-medium transition-all">
                    <i class="fa-solid fa-lightbulb"></i> Insights
                </button>
            </div>

            <div class="mt-6 text-center">
                <div class="inline-flex items-center gap-2 bg-cyan-900/30 text-cyan-400 text-xs px-4 py-2 rounded-full">
                    <div class="w-2 h-2 bg-cyan-400 rounded-full pulse-dot"></div>
                    GROQ + HINDSIGHT LIVE
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <!-- Top Bar -->
            <div class="h-14 border-b border-zinc-800 flex items-center px-6 justify-between glass-dark">
                <div class="flex items-center gap-6 text-sm font-medium" id="tabs">
                    <button onclick="switchTab(0)" class="tab-active pb-1 transition-all">Chat</button>
                    <button onclick="switchTab(1)" class="pb-1 text-zinc-400 hover:text-white transition-all">Kanban</button>
                    <button onclick="switchTab(2)" class="pb-1 text-zinc-400 hover:text-white transition-all">Dashboard</button>
                    <button onclick="switchTab(3)" class="pb-1 text-zinc-400 hover:text-white transition-all">Insights</button>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="voiceInput()" class="flex items-center gap-2 bg-cyan-600 hover:bg-cyan-500 px-5 py-2 rounded-xl text-sm transition-all">
                        <i class="fa-solid fa-microphone"></i> Voice
                    </button>
                </div>
            </div>

            <!-- Selected Members Banner -->
            <div id="selectedMembersBanner" class="hidden bg-zinc-900 border-b border-zinc-800 px-6 py-3">
                <div class="flex items-center gap-3">
                    <span class="text-xs text-zinc-500 uppercase">Messaging:</span>
                    <div id="selectedMembersTags" class="flex flex-wrap gap-2">
                        <!-- Populated by JS -->
                    </div>
                    <button onclick="clearSelectedMembers()" class="text-zinc-500 hover:text-white text-xs ml-auto">
                        <i class="fa-solid fa-times"></i> Clear
                    </button>
                </div>
            </div>

            <!-- Tab Contents -->
            <div id="tabContent" class="flex-1 overflow-auto p-6">
                <!-- Chat Tab -->
                <div id="chatTab">
                    <div id="chatContainer" class="space-y-4 max-w-4xl mx-auto pb-4"></div>
                    <div class="max-w-4xl mx-auto relative mt-4">
                        <input id="userInput" type="text" placeholder="Type a message... (Select members to direct message)" 
                               onkeypress="if(event.key==='Enter') sendMessage()" 
                               class="w-full glass rounded-2xl px-6 py-4 pr-24 text-sm focus:outline-none focus:border-cyan-500 transition-all">
                        <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center gap-2">
                            <button onclick="showRecipientSelector()" class="w-10 h-10 glass rounded-xl flex items-center justify-center hover:bg-white/10 transition-all" title="Select recipients">
                                <i class="fa-solid fa-users text-cyan-400"></i>
                            </button>
                            <button onclick="sendMessage()" class="w-10 h-10 bg-gradient-to-r from-cyan-500 to-sky-400 rounded-xl flex items-center justify-center hover:opacity-90 transition-all">
                                <i class="fa-solid fa-paper-plane text-white"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Kanban Tab -->
                <div id="kanbanTab" class="hidden">
                    <div class="grid grid-cols-3 gap-6" id="kanbanBoard">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Dashboard Tab -->
                <div id="dashboardTab" class="hidden">
                    <!-- Toggle between Team and Individual -->
                    <div class="flex items-center justify-between mb-6 max-w-5xl mx-auto">
                        <div class="flex items-center gap-4">
                            <button id="teamViewBtn" onclick="toggleDashboardView('team')" class="px-4 py-2 rounded-xl bg-cyan-600 text-white text-sm font-medium transition-all">
                                Team Overview
                            </button>
                            <button id="individualViewBtn" onclick="toggleDashboardView('individual')" class="px-4 py-2 rounded-xl glass text-zinc-400 text-sm font-medium transition-all">
                                Individual View
                            </button>
                        </div>
                        <div id="individualSelector" class="hidden">
                            <select onchange="selectMemberForDashboard(this.value)" class="glass rounded-xl px-4 py-2 text-sm focus:outline-none">
                                <option value="">Select Member</option>
                            </select>
                        </div>
                    </div>

                    <!-- Team Dashboard -->
                    <div id="teamDashboard" class="max-w-5xl mx-auto">
                        <div class="grid grid-cols-3 gap-6 mb-6">
                            <div class="glass rounded-2xl p-6 text-center">
                                <div class="text-3xl font-bold gradient-text" id="teamTotalTasks">12</div>
                                <div class="text-xs text-zinc-500 mt-1">Total Tasks</div>
                            </div>
                            <div class="glass rounded-2xl p-6 text-center">
                                <div class="text-3xl font-bold text-emerald-400" id="teamCompletedTasks">7</div>
                                <div class="text-xs text-zinc-500 mt-1">Completed</div>
                            </div>
                            <div class="glass rounded-2xl p-6 text-center">
                                <div class="text-3xl font-bold text-amber-400" id="teamProgress">58%</div>
                                <div class="text-xs text-zinc-500 mt-1">Progress</div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-6">
                            <div class="glass rounded-2xl p-6">
                                <h3 class="text-lg font-medium mb-4">Team Progress</h3>
                                <canvas id="progressChart" height="180"></canvas>
                            </div>
                            <div class="glass rounded-2xl p-6">
                                <h3 class="text-lg font-medium mb-4">Task Distribution</h3>
                                <canvas id="pieChart" height="180"></canvas>
                            </div>
                        </div>
                    </div>

                    <!-- Individual Dashboard -->
                    <div id="individualDashboard" class="hidden max-w-5xl mx-auto">
                        <div id="individualDashboardContent">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>

                <!-- Insights Tab -->
                <div id="insightsTab" class="hidden space-y-4 max-w-4xl mx-auto">
                    <h2 class="text-xl font-semibold">Hindsight Insights</h2>
                    <div id="insightsFeed" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <!-- Live Memory Sidebar -->
        <div class="w-80 border-l border-zinc-800 bg-zinc-900 p-6 overflow-y-auto">
            <h3 class="uppercase text-xs tracking-widest mb-4 flex items-center gap-2 text-zinc-500">
                <i class="fa-solid fa-database"></i> HINDSIGHT MEMORY
            </h3>
            <div id="memoryFeed" class="space-y-3"></div>
        </div>
    </div>

    <!-- Add Member Modal -->
    <div id="addMemberModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="glass-dark rounded-3xl p-8 w-full max-w-md slide-in">
            <h3 class="text-xl font-semibold mb-6">Add Team Member</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-zinc-500 uppercase">Name</label>
                    <input id="newMemberName" type="text" placeholder="Enter name" class="w-full glass rounded-xl px-4 py-3 text-sm mt-1 focus:outline-none focus:border-cyan-500">
                </div>
                <div>
                    <label class="text-xs text-zinc-500 uppercase">Role</label>
                    <input id="newMemberRole" type="text" placeholder="e.g., Frontend Developer" class="w-full glass rounded-xl px-4 py-3 text-sm mt-1 focus:outline-none focus:border-cyan-500">
                </div>
                <div>
                    <label class="text-xs text-zinc-500 uppercase">Avatar Color</label>
                    <div class="flex gap-2 mt-2">
                        <button onclick="selectColor('cyan')" class="w-8 h-8 rounded-full bg-cyan-500 color-btn" data-color="cyan"></button>
                        <button onclick="selectColor('violet')" class="w-8 h-8 rounded-full bg-violet-500 color-btn" data-color="violet"></button>
                        <button onclick="selectColor('emerald')" class="w-8 h-8 rounded-full bg-emerald-500 color-btn" data-color="emerald"></button>
                        <button onclick="selectColor('amber')" class="w-8 h-8 rounded-full bg-amber-500 color-btn" data-color="amber"></button>
                        <button onclick="selectColor('rose')" class="w-8 h-8 rounded-full bg-rose-500 color-btn" data-color="rose"></button>
                    </div>
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeAddMemberModal()" class="flex-1 py-3 glass rounded-xl text-sm hover:bg-white/10 transition-all">Cancel</button>
                <button onclick="addMember()" class="flex-1 py-3 bg-cyan-600 hover:bg-cyan-500 rounded-xl text-sm font-medium transition-all">Add Member</button>
            </div>
        </div>
    </div>

    <!-- Recipient Selector Modal -->
    <div id="recipientModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="glass-dark rounded-3xl p-8 w-full max-w-md slide-in">
            <h3 class="text-xl font-semibold mb-6">Select Recipients</h3>
            <div id="recipientList" class="space-y-2 max-h-80 overflow-y-auto">
                <!-- Populated by JS -->
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeRecipientSelector()" class="flex-1 py-3 glass rounded-xl text-sm hover:bg-white/10 transition-all">Cancel</button>
                <button onclick="confirmRecipients()" class="flex-1 py-3 bg-cyan-600 hover:bg-cyan-500 rounded-xl text-sm font-medium transition-all">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        // Suppress Tailwind warning
        (function(){const w=console.warn;console.warn=function(...a){if(a[0]&&a[0].includes('tailwindcss'))return;w.apply(console,a);};})();

        // Team Members Data
        let members = [
            { id: 1, name: "Alice Chen", role: "Frontend Lead", color: "cyan", status: "online", tasks: { total: 5, done: 3 }, activity: "Completed UI components" },
            { id: 2, name: "Bob Martinez", role: "Backend Dev", color: "violet", status: "online", tasks: { total: 4, done: 2 }, activity: "Working on API endpoints" },
            { id: 3, name: "Carol Johnson", role: "Designer", color: "emerald", status: "away", tasks: { total: 3, done: 2 }, activity: "Finalizing mockups" },
            { id: 4, name: "David Kim", role: "QA Engineer", color: "amber", status: "offline", tasks: { total: 6, done: 1 }, activity: "Test case preparation" }
        ];

        let selectedMembers = [];
        let selectedMemberDashboard = null;
        let currentDashboardView = 'team';

        let memory = [
            { id: 1, text: "Alice - Frontend Lead assigned", time: "Just now", column: "todo", memberId: 1 },
            { id: 2, text: "Bob - Backend API completed", time: "2h ago", column: "done", memberId: 2 },
            { id: 3, text: "Deadline: March 28 Report", time: "Yesterday", column: "progress", memberId: null }
        ];

        let messages = [{
            role: "ai",
            content: "Welcome to GroupForge! I'm your AI project manager powered by Hindsight. Select team members to send direct messages, or chat with everyone.",
            recipients: []
        }];

        let currentTab = 0;
        let progressChart, pieChart;
        let selectedColor = 'cyan';
        let tempSelectedRecipients = [];

        const colorClasses = {
            cyan: 'bg-cyan-500',
            violet: 'bg-violet-500',
            emerald: 'bg-emerald-500',
            amber: 'bg-amber-500',
            rose: 'bg-rose-500'
        };

        const statusColors = {
            online: 'bg-emerald-400',
            away: 'bg-amber-400',
            offline: 'bg-zinc-500'
        };

        function renderMembers() {
            const list = document.getElementById("membersList");
            list.innerHTML = members.map(m => `
                <div class="member-card glass rounded-xl p-3 cursor-pointer ${selectedMembers.includes(m.id) ? 'selected' : ''}" 
                     onclick="toggleMemberSelection(${m.id})" 
                     data-member-id="${m.id}">
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <div class="w-10 h-10 ${colorClasses[m.color]} rounded-xl flex items-center justify-center text-white font-semibold text-sm">
                                ${m.name.split(' ').map(n => n[0]).join('')}
                            </div>
                            <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 ${statusColors[m.status]} rounded-full border-2 border-zinc-900"></div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="text-sm font-medium truncate">${m.name}</div>
                            <div class="text-xs text-zinc-500 truncate">${m.role}</div>
                        </div>
                        <div class="text-xs text-zinc-500">${m.tasks.done}/${m.tasks.total}</div>
                    </div>
                </div>
            `).join('');
        }

        function toggleMemberSelection(memberId) {
            const index = selectedMembers.indexOf(memberId);
            if (index > -1) {
                selectedMembers.splice(index, 1);
            } else {
                selectedMembers.push(memberId);
            }
            renderMembers();
            updateSelectedBanner();
            
            // If in dashboard tab and clicking a member, show their dashboard
            if (currentTab === 2) {
                toggleDashboardView('individual');
                selectMemberForDashboard(memberId);
            }
        }

        function updateSelectedBanner() {
            const banner = document.getElementById("selectedMembersBanner");
            const tags = document.getElementById("selectedMembersTags");
            
            if (selectedMembers.length > 0) {
                banner.classList.remove("hidden");
                const selectedMembersData = members.filter(m => selectedMembers.includes(m.id));
                tags.innerHTML = selectedMembersData.map(m => `
                    <span class="inline-flex items-center gap-1 px-3 py-1 ${colorClasses[m.color]} bg-opacity-20 text-${m.color}-400 rounded-full text-xs">
                        ${m.name}
                        <button onclick="event.stopPropagation(); toggleMemberSelection(${m.id})" class="hover:text-white">
                            <i class="fa-solid fa-times"></i>
                        </button>
                    </span>
                `).join('');
            } else {
                banner.classList.add("hidden");
            }
        }

        function clearSelectedMembers() {
            selectedMembers = [];
            renderMembers();
            updateSelectedBanner();
        }

        function renderMemory() {
            const feed = document.getElementById("memoryFeed");
            feed.innerHTML = memory.map(m => {
                const member = m.memberId ? members.find(mem => mem.id === m.memberId) : null;
                return `
                    <div class="glass rounded-xl p-3 text-sm memory-card">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-xs text-cyan-400">${m.time}</span>
                            ${member ? `<span class="text-xs ${colorClasses[member.color]} bg-opacity-20 px-2 py-0.5 rounded-full">${member.name.split(' ')[0]}</span>` : ''}
                        </div>
                        <div>${m.text}</div>
                    </div>
                `;
            }).join('');
        }

        function addToMemory(text, column = "todo", memberId = null) {
            memory.unshift({ id: Date.now(), text: text, time: "Just now", column: column, memberId: memberId });
            renderMemory();
            refreshCharts();
        }

        function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            const recipientNames = selectedMembers.length > 0 
                ? members.filter(m => selectedMembers.includes(m.id)).map(m => m.name)
                : ['Everyone'];

            messages.push({ 
                role: "user", 
                content: text, 
                recipients: [...selectedMembers],
                recipientNames: recipientNames
            });
            renderChat();
            input.value = "";

            // Show loading
            const loadingEl = document.createElement("div");
            loadingEl.innerHTML = `<div class="flex justify-start"><div class="glass px-5 py-3 rounded-2xl rounded-tl-none text-sm">Thinking...</div></div>`;
            document.getElementById("chatContainer").appendChild(loadingEl);

            setTimeout(() => {
                loadingEl.remove();
                let reply = "";
                
                if (text.toLowerCase().includes("assign") || text.toLowerCase().includes("task")) {
                    const assignedMember = selectedMembers.length > 0 
                        ? members.find(m => m.id === selectedMembers[0])
                        : null;
                    if (assignedMember) {
                        reply = `Task assigned to ${assignedMember.name}! Added to Kanban board and stored in Hindsight memory.`;
                        addToMemory(`Task: ${text}`, "todo", assignedMember.id);
                        assignedMember.tasks.total++;
                    } else {
                        reply = "Task created! Assign it to a team member by selecting them first.";
                        addToMemory(text, "todo");
                    }
                } else if (text.toLowerCase().includes("summary") || text.toLowerCase().includes("progress")) {
                    reply = `Team Progress: ${Math.round((members.reduce((a,m) => a + m.tasks.done, 0) / members.reduce((a,m) => a + m.tasks.total, 0)) * 100)}% complete. ${members.filter(m => m.status === 'online').length} members online.`;
                } else if (text.toLowerCase().includes("insight")) {
                    reply = "Hindsight AI: Your team is most productive between 10am-2pm. Consider scheduling collaborative tasks during this window.";
                } else {
                    reply = selectedMembers.length > 0 
                        ? `Message delivered to ${recipientNames.join(', ')}. Stored in Hindsight for future reference.`
                        : "Message broadcast to all team members and stored in Hindsight memory.";
                    addToMemory(`Chat: ${text.substring(0, 50)}...`, "progress");
                }

                messages.push({ role: "ai", content: reply, recipients: [] });
                renderChat();
                renderMembers();
            }, 800);
        }

        function renderChat() {
            const container = document.getElementById("chatContainer");
            container.innerHTML = messages.map(m => {
                const isUser = m.role === 'user';
                let recipientHtml = '';
                if (isUser && m.recipientNames && m.recipientNames.length > 0) {
                    recipientHtml = `<div class="text-xs text-zinc-400 mb-1">To: ${m.recipientNames.join(', ')}</div>`;
                }
                return `
                    <div class="flex ${isUser ? 'justify-end' : 'justify-start'}">
                        <div class="${isUser ? 'chat-bubble-user text-white' : 'chat-bubble-ai'} max-w-md px-5 py-3 rounded-2xl ${isUser ? 'rounded-tr-sm' : 'rounded-tl-sm'}">
                            ${recipientHtml}
                            <div>${m.content}</div>
                        </div>
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        function renderKanban() {
            const board = document.getElementById("kanbanBoard");
            const columns = [
                { id: 'todo', title: 'To Do', color: 'text-cyan-400' },
                { id: 'progress', title: 'In Progress', color: 'text-amber-400' },
                { id: 'done', title: 'Done', color: 'text-emerald-400' }
            ];

            board.innerHTML = columns.map(col => `
                <div class="glass rounded-2xl p-5">
                    <h3 class="font-medium mb-4 ${col.color}">${col.title}</h3>
                    <div class="space-y-3 min-h-[200px]" ondrop="drop(event,'${col.id}')" ondragover="allowDrop(event)">
                        ${memory.filter(m => m.column === col.id).map(m => {
                            const member = m.memberId ? members.find(mem => mem.id === m.memberId) : null;
                            return `
                                <div draggable="true" ondragstart="drag(event)" data-id="${m.id}" 
                                     class="bg-zinc-800 rounded-xl p-3 text-sm cursor-grab hover:bg-zinc-700 transition-all">
                                    <div>${m.text}</div>
                                    ${member ? `<div class="mt-2 text-xs ${colorClasses[member.color]} bg-opacity-20 px-2 py-1 rounded-full inline-block">${member.name.split(' ')[0]}</div>` : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.dataset.id); }
        function drop(ev, newColumn) {
            ev.preventDefault();
            const id = parseInt(ev.dataTransfer.getData("text"));
            const item = memory.find(m => m.id === id);
            if (item) {
                item.column = newColumn;
                if (newColumn === 'done' && item.memberId) {
                    const member = members.find(m => m.id === item.memberId);
                    if (member) member.tasks.done++;
                }
            }
            renderKanban();
            refreshCharts();
            renderMembers();
        }

        function initCharts() {
            const ctx1 = document.getElementById('progressChart');
            if (progressChart) progressChart.destroy();
            progressChart = new Chart(ctx1, {
                type: 'doughnut',
                data: { 
                    labels: ['Done', 'In Progress', 'To Do'], 
                    datasets: [{ 
                        data: [
                            memory.filter(m => m.column === 'done').length,
                            memory.filter(m => m.column === 'progress').length,
                            memory.filter(m => m.column === 'todo').length
                        ], 
                        backgroundColor: ['#10b981', '#f59e0b', '#0ea5e9'],
                        borderWidth: 0
                    }] 
                },
                options: { 
                    cutout: '70%', 
                    plugins: { legend: { display: true, position: 'bottom', labels: { color: '#a1a1aa' } } } 
                }
            });

            const ctx2 = document.getElementById('pieChart');
            if (pieChart) pieChart.destroy();
            pieChart = new Chart(ctx2, {
                type: 'bar',
                data: { 
                    labels: members.map(m => m.name.split(' ')[0]), 
                    datasets: [{ 
                        label: 'Tasks',
                        data: members.map(m => m.tasks.total), 
                        backgroundColor: '#0ea5e9',
                        borderRadius: 8
                    }, {
                        label: 'Completed',
                        data: members.map(m => m.tasks.done), 
                        backgroundColor: '#10b981',
                        borderRadius: 8
                    }] 
                },
                options: { 
                    scales: { 
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#a1a1aa' } },
                        x: { grid: { display: false }, ticks: { color: '#a1a1aa' } }
                    },
                    plugins: { legend: { display: true, position: 'bottom', labels: { color: '#a1a1aa' } } }
                }
            });

            updateTeamStats();
        }

        function updateTeamStats() {
            const totalTasks = memory.length;
            const completedTasks = memory.filter(m => m.column === 'done').length;
            const progress = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;

            document.getElementById('teamTotalTasks').textContent = totalTasks;
            document.getElementById('teamCompletedTasks').textContent = completedTasks;
            document.getElementById('teamProgress').textContent = progress + '%';
        }

        function refreshCharts() {
            if (progressChart) {
                progressChart.data.datasets[0].data = [
                    memory.filter(m => m.column === 'done').length,
                    memory.filter(m => m.column === 'progress').length,
                    memory.filter(m => m.column === 'todo').length
                ];
                progressChart.update();
            }
            if (pieChart) {
                pieChart.data.labels = members.map(m => m.name.split(' ')[0]);
                pieChart.data.datasets[0].data = members.map(m => m.tasks.total);
                pieChart.data.datasets[1].data = members.map(m => m.tasks.done);
                pieChart.update();
            }
            updateTeamStats();
        }

        function toggleDashboardView(view) {
            currentDashboardView = view;
            const teamBtn = document.getElementById('teamViewBtn');
            const indivBtn = document.getElementById('individualViewBtn');
            const teamDash = document.getElementById('teamDashboard');
            const indivDash = document.getElementById('individualDashboard');
            const indivSelector = document.getElementById('individualSelector');

            if (view === 'team') {
                teamBtn.className = 'px-4 py-2 rounded-xl bg-cyan-600 text-white text-sm font-medium transition-all';
                indivBtn.className = 'px-4 py-2 rounded-xl glass text-zinc-400 text-sm font-medium transition-all';
                teamDash.classList.remove('hidden');
                indivDash.classList.add('hidden');
                indivSelector.classList.add('hidden');
            } else {
                teamBtn.className = 'px-4 py-2 rounded-xl glass text-zinc-400 text-sm font-medium transition-all';
                indivBtn.className = 'px-4 py-2 rounded-xl bg-cyan-600 text-white text-sm font-medium transition-all';
                teamDash.classList.add('hidden');
                indivDash.classList.remove('hidden');
                indivSelector.classList.remove('hidden');
                updateIndividualSelector();
            }
        }

        function updateIndividualSelector() {
            const selector = document.querySelector('#individualSelector select');
            selector.innerHTML = '<option value="">Select Member</option>' + 
                members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
        }

        function selectMemberForDashboard(memberId) {
            if (!memberId) return;
            selectedMemberDashboard = members.find(m => m.id === parseInt(memberId));
            if (!selectedMemberDashboard) return;

            const memberTasks = memory.filter(m => m.memberId === selectedMemberDashboard.id);
            const memberDone = memberTasks.filter(t => t.column === 'done').length;
            const progress = memberTasks.length > 0 ? Math.round((memberDone / memberTasks.length) * 100) : 0;

            const content = document.getElementById('individualDashboardContent');
            content.innerHTML = `
                <div class="glass rounded-2xl p-6 mb-6">
                    <div class="flex items-center gap-6">
                        <div class="w-20 h-20 ${colorClasses[selectedMemberDashboard.color]} rounded-2xl flex items-center justify-center text-white text-2xl font-bold">
                            ${selectedMemberDashboard.name.split(' ').map(n => n[0]).join('')}
                        </div>
                        <div>
                            <h3 class="text-2xl font-semibold">${selectedMemberDashboard.name}</h3>
                            <p class="text-zinc-400">${selectedMemberDashboard.role}</p>
                            <div class="flex items-center gap-2 mt-2">
                                <div class="w-2 h-2 ${statusColors[selectedMemberDashboard.status]} rounded-full"></div>
                                <span class="text-sm text-zinc-500 capitalize">${selectedMemberDashboard.status}</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-6 mb-6">
                    <div class="glass rounded-2xl p-6 text-center">
                        <div class="text-3xl font-bold text-cyan-400">${memberTasks.length}</div>
                        <div class="text-xs text-zinc-500 mt-1">Assigned Tasks</div>
                    </div>
                    <div class="glass rounded-2xl p-6 text-center">
                        <div class="text-3xl font-bold text-emerald-400">${memberDone}</div>
                        <div class="text-xs text-zinc-500 mt-1">Completed</div>
                    </div>
                    <div class="glass rounded-2xl p-6 text-center">
                        <div class="text-3xl font-bold gradient-text">${progress}%</div>
                        <div class="text-xs text-zinc-500 mt-1">Completion Rate</div>
                    </div>
                </div>

                <div class="glass rounded-2xl p-6">
                    <h4 class="font-medium mb-4">Recent Activity</h4>
                    <div class="text-sm text-zinc-400 mb-4">${selectedMemberDashboard.activity}</div>
                    <h4 class="font-medium mb-3">Tasks</h4>
                    <div class="space-y-2">
                        ${memberTasks.length > 0 ? memberTasks.map(t => `
                            <div class="flex items-center justify-between bg-zinc-800 rounded-xl px-4 py-3 text-sm">
                                <span>${t.text}</span>
                                <span class="text-xs px-2 py-1 rounded-full ${
                                    t.column === 'done' ? 'bg-emerald-500/20 text-emerald-400' :
                                    t.column === 'progress' ? 'bg-amber-500/20 text-amber-400' :
                                    'bg-cyan-500/20 text-cyan-400'
                                }">${t.column}</span>
                            </div>
                        `).join('') : '<div class="text-zinc-500 text-sm">No tasks assigned yet</div>'}
                    </div>
                </div>
            `;
        }

        function renderInsights() {
            const feed = document.getElementById("insightsFeed");
            feed.innerHTML = `
                <div class="glass rounded-2xl p-5">
                    <div class="flex items-center gap-3 mb-2">
                        <i class="fa-solid fa-chart-line text-cyan-400"></i>
                        <span class="font-medium">Performance Pattern</span>
                    </div>
                    <p class="text-sm text-zinc-400">Alice completes frontend tasks 40% faster than team average. Consider assigning more UI work.</p>
                </div>
                <div class="glass rounded-2xl p-5">
                    <div class="flex items-center gap-3 mb-2">
                        <i class="fa-solid fa-lightbulb text-amber-400"></i>
                        <span class="font-medium">Recommendation</span>
                    </div>
                    <p class="text-sm text-zinc-400">Move documentation tasks to Carol - she finished similar work yesterday with high quality.</p>
                </div>
                <div class="glass rounded-2xl p-5">
                    <div class="flex items-center gap-3 mb-2">
                        <i class="fa-solid fa-triangle-exclamation text-rose-400"></i>
                        <span class="font-medium">Risk Alert</span>
                    </div>
                    <p class="text-sm text-zinc-400">Only 3 days until deadline. David has 5 pending QA tasks - Hindsight suggests adding buffer time.</p>
                </div>
                <div class="glass rounded-2xl p-5">
                    <div class="flex items-center gap-3 mb-2">
                        <i class="fa-solid fa-users text-violet-400"></i>
                        <span class="font-medium">Team Synergy</span>
                    </div>
                    <p class="text-sm text-zinc-400">Best collaboration: Alice + Carol on design-to-code tasks. 25% faster handoffs when paired.</p>
                </div>
            `;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('#tabs button').forEach((b, i) => {
                b.classList.toggle('tab-active', i === tab);
                b.classList.toggle('text-zinc-400', i !== tab);
            });

            document.getElementById('chatTab').classList.toggle('hidden', tab !== 0);
            document.getElementById('kanbanTab').classList.toggle('hidden', tab !== 1);
            document.getElementById('dashboardTab').classList.toggle('hidden', tab !== 2);
            document.getElementById('insightsTab').classList.toggle('hidden', tab !== 3);

            if (tab === 1) renderKanban();
            if (tab === 2) { if (!progressChart) initCharts(); else refreshCharts(); }
            if (tab === 3) renderInsights();
        }

        function openAddMemberModal() {
            document.getElementById('addMemberModal').classList.remove('hidden');
        }

        function closeAddMemberModal() {
            document.getElementById('addMemberModal').classList.add('hidden');
            document.getElementById('newMemberName').value = '';
            document.getElementById('newMemberRole').value = '';
        }

        function selectColor(color) {
            selectedColor = color;
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.classList.toggle('ring-2', btn.dataset.color === color);
                btn.classList.toggle('ring-white', btn.dataset.color === color);
            });
        }

        function addMember() {
            const name = document.getElementById('newMemberName').value.trim();
            const role = document.getElementById('newMemberRole').value.trim();
            
            if (!name) {
                alert('Please enter a name');
                return;
            }

            members.push({
                id: Date.now(),
                name: name,
                role: role || 'Team Member',
                color: selectedColor,
                status: 'online',
                tasks: { total: 0, done: 0 },
                activity: 'Just joined the team'
            });

            renderMembers();
            closeAddMemberModal();
            refreshCharts();
        }

        function showRecipientSelector() {
            tempSelectedRecipients = [...selectedMembers];
            const list = document.getElementById('recipientList');
            list.innerHTML = `
                <div class="flex items-center gap-3 p-3 glass rounded-xl cursor-pointer hover:bg-white/5 ${tempSelectedRecipients.length === 0 ? 'bg-cyan-500/20' : ''}" 
                     onclick="toggleRecipient(0)">
                    <div class="w-10 h-10 bg-zinc-700 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-users text-zinc-400"></i>
                    </div>
                    <div class="flex-1">
                        <div class="font-medium">Everyone</div>
                        <div class="text-xs text-zinc-500">Broadcast to all team members</div>
                    </div>
                    <div class="w-5 h-5 rounded-full border-2 ${tempSelectedRecipients.length === 0 ? 'bg-cyan-500 border-cyan-500' : 'border-zinc-600'}">
                        ${tempSelectedRecipients.length === 0 ? '<i class="fa-solid fa-check text-white text-xs"></i>' : ''}
                    </div>
                </div>
                <div class="border-t border-zinc-700 my-3"></div>
                ${members.map(m => `
                    <div class="flex items-center gap-3 p-3 glass rounded-xl cursor-pointer hover:bg-white/5 ${tempSelectedRecipients.includes(m.id) ? 'bg-cyan-500/20' : ''}" 
                         onclick="toggleRecipient(${m.id})">
                        <div class="w-10 h-10 ${colorClasses[m.color]} rounded-xl flex items-center justify-center text-white font-semibold text-sm">
                            ${m.name.split(' ').map(n => n[0]).join('')}
                        </div>
                        <div class="flex-1">
                            <div class="font-medium">${m.name}</div>
                            <div class="text-xs text-zinc-500">${m.role}</div>
                        </div>
                        <div class="w-5 h-5 rounded-full border-2 ${tempSelectedRecipients.includes(m.id) ? 'bg-cyan-500 border-cyan-500' : 'border-zinc-600'}">
                            ${tempSelectedRecipients.includes(m.id) ? '<i class="fa-solid fa-check text-white text-xs"></i>' : ''}
                        </div>
                    </div>
                `).join('')}
            `;
            document.getElementById('recipientModal').classList.remove('hidden');
        }

        function toggleRecipient(memberId) {
            if (memberId === 0) {
                tempSelectedRecipients = [];
            } else {
                const index = tempSelectedRecipients.indexOf(memberId);
                if (index > -1) {
                    tempSelectedRecipients.splice(index, 1);
                } else {
                    tempSelectedRecipients.push(memberId);
                }
            }
            showRecipientSelector();
        }

        function closeRecipientSelector() {
            document.getElementById('recipientModal').classList.add('hidden');
        }

        function confirmRecipients() {
            selectedMembers = [...tempSelectedRecipients];
            renderMembers();
            updateSelectedBanner();
            closeRecipientSelector();
        }

        function voiceInput() {
            if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
                alert("Voice input not supported in this browser");
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.onresult = (e) => {
                document.getElementById("userInput").value = e.results[0][0].transcript;
                sendMessage();
            };
            recognition.start();
        }

        window.onload = () => {
            renderMembers();
            renderChat();
            renderMemory();
            switchTab(0);
            
            // Initial memory entries
            setTimeout(() => {
                addToMemory("Team kickoff meeting completed", "done");
            }, 1000);
        };
    </script>
</body>
</html>
